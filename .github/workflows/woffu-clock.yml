name: Woffu Auto Clock

on:
  schedule:
    # IN: 9:25 Madrid winter (CET = UTC+1) → 08:25 UTC
    - cron: '25 8 * * 1-5'
    # OUT: 18:25 Madrid winter (CET = UTC+1) → 17:25 UTC
    - cron: '25 17 * * 1-5'

  workflow_dispatch:
    inputs:
      type:
        description: 'Clock type'
        required: true
        default: 'in'
        type: choice
        options: [in, out]
      dry_run:
        description: 'Dry run (no actual clocking)'
        required: false
        default: 'false'
        type: choice
        options: ['true', 'false']

jobs:
  clock:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pytz

      - name: Determine clock type
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "CLOCK_TYPE=${{ github.event.inputs.type }}" >> $GITHUB_ENV
            echo "DRY_RUN=${{ github.event.inputs.dry_run }}" >> $GITHUB_ENV
          else
            HOUR=$(date -u +%H)
            [ "$HOUR" -lt "13" ] && echo "CLOCK_TYPE=in" >> $GITHUB_ENV || echo "CLOCK_TYPE=out" >> $GITHUB_ENV
            echo "DRY_RUN=false" >> $GITHUB_ENV
          fi

      - name: Clock
        env:
          WOFFU_DOMAIN: ${{ secrets.WOFFU_DOMAIN }}
          WOFFU_USER:   ${{ secrets.WOFFU_USER }}
          WOFFU_PASS:   ${{ secrets.WOFFU_PASS }}
        run: |
          echo "Type: $CLOCK_TYPE | Dry run: $DRY_RUN"
          if [ "$DRY_RUN" = "true" ]; then
            python woffu.py clock --type $CLOCK_TYPE --dry-run
          else
            python woffu.py clock --type $CLOCK_TYPE
          fi