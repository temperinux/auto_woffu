name: Woffu Auto Clock

on:
  workflow_dispatch:
    inputs:
      type:
        description: 'Clock type'
        required: true
        default: 'in'
        type: choice
        options: [in, out]
      dry_run:
        description: 'Dry run (no actual clocking)'
        required: false
        default: 'false'
        type: choice
        options: ['true', 'false']

jobs:
  clock:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pytz

      - name: Clock
        env:
          WOFFU_DOMAIN: ${{ secrets.WOFFU_DOMAIN }}
          WOFFU_USER:   ${{ secrets.WOFFU_USER }}
          WOFFU_PASS:   ${{ secrets.WOFFU_PASS }}
        run: |
          echo "Type: ${{ github.event.inputs.type }} | Dry run: ${{ github.event.inputs.dry_run }}"
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python woffu.py clock --type ${{ github.event.inputs.type }} --dry-run
          else
            python woffu.py clock --type ${{ github.event.inputs.type }}
          fi